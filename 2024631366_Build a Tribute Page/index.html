<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tribute Page</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main id="main">

    <h1 id="title">Nikola Tesla</h1>

    <figure id="img-div">
      <img
        id="image"
        src="https://upload.wikimedia.org/wikipedia/commons/d/d4/N.Tesla.JPG"
        alt="Nikola Tesla"
      >

      <figcaption id="img-caption">
        Nikola Tesla was a famous inventor and electrical engineer.
      </figcaption>
    </figure>

    <div id="tribute-info">
      Nikola Tesla developed many important technologies including
      alternating current (AC) electricity systems that are widely used today.
    </div>

    <a
      id="tribute-link"
      href="https://en.wikipedia.org/wiki/Nikola_Tesla"
      target="_blank"
    >
      Learn more about Nikola Tesla
    </a>

  </main>
</body>
</html>
