<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Landing Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="header">
  <img
    id="header-img"
    src="https://cdn.freecodecamp.org/testable-projects-fcc/images/product-landing-page-logo.png"
    alt="logo"
  >

  <nav id="nav-bar">
    <a class="nav-link" href="#features">Features</a>
    <a class="nav-link" href="#video-section">Video</a>
    <a class="nav-link" href="#pricing">Pricing</a>
  </nav>
</header>

<section id="features">
  <h2>Features</h2>
  <p>Our product is fast and reliable.</p>
</section>

<section id="video-section">
  <h2>Video</h2>

  <iframe
    id="video"
    width="560"
    height="315"
    src="https://www.youtube.com/embed/y8Yv4pnO7qc"
    title="YouTube video player"
    allowfullscreen>
  </iframe>
</section>

<section id="pricing">
  <h2>Pricing</h2>
  <p>Affordable plans for everyone.</p>
</section>

<form
  id="form"
  action="https://www.freecodecamp.org/email-submit"
>
  <input
    id="email"
    name="email"
    type="email"
    placeholder="Enter your email"
  >

  <input
    id="submit"
    type="submit"
    value="Submit"
  >
</form>

</body>
</html>
